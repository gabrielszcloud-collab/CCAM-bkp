<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CCAM - Financeiro</title>
  <meta name="description" content="Financeiro no CCAM." />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="index.html">
        <span class="logo" aria-hidden="true"></span>
        <span class="brand__text">
          <span class="brand__name">CCAM</span>
          <span class="brand__tag">Controle & acompanhamento</span>
        </span>
      </a>

      <nav class="nav" data-nav aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="cadastro.html">Cadastro</a>
        <a href="treinos.html">Treinos</a>
        <a href="financeiro.html">Financeiro</a>
        <a href="empresa.html">Empresa</a>
        <a href="mural.html">Mural</a>
        <a href="crm.html">CRM</a>
      </nav>
    </div>
  </header>

 <main>
    <div class="container">
      <section class="hero">
        <h1>Gestão Financeira</h1>
        <p>Lançamento de mensalidades e acompanhamento de status.</p>
      </section>

      <section class="grid grid--2">
        
        <article class="card">
          <h2>Últimos Lançamentos</h2>
          <table aria-label="Tabela de movimentações financeiras">
            <thead>
              <tr>
                <th>Aluno</th>
                <th>Valor</th>
                <th>Vencimento</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tabela-financeiro">
              </tbody>
          </table>
          <div class="spacer"></div>
          <div class="help">Histórico das últimas mensalidades geradas.</div>
        </article>

        <article class="card" >
          <h2>Lançar Nova Mensalidade</h2>
          <form id="formFinanceiro" data-enhance>
            
            <div class="field">
              <label for="aluno_select">Selecionar Aluno *</label>
              <select id="aluno_select" name="aluno" required>
                <option value="" disabled selected>Carregando alunos...</option>
              </select>
            </div>

            <div class="row">
              <div class="field">
                <label for="fin_valor">Valor (R$) *</label>
                <input type="number" id="fin_valor" step="0.01" inputmode="decimal" placeholder="Ex: 120.00" required />
              </div>
              
              <div class="field">
                <label for="fin_vencimento">Data de Vencimento *</label>
                <input type="date" id="fin_vencimento" name="vencimento" required />
              </div>
            </div>

            <div class="inline">
              <button class="btn btn--brand" type="submit">Gerar Cobrança</button>
            </div>
          </form>
        </article>

      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div>CCAM • Financeiro</div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
